<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lanchonete do Zé - Atendente Virtual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user .bubble {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .input-area {
            display: flex;
            padding: 16px;
            background: white;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #f5576c;
        }

        .input-area button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.1s, opacity 0.2s;
        }

        .input-area button:active {
            transform: scale(0.97);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .typing {
            font-size: 12px;
            color: #999;
            padding: 8px 20px 12px 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>🍔 Lanchonete do Zé</h1>
            <p>Atendente Virtual 24h</p>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing" id="typing">
            🤖 Digitando...
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Digite seu pedido..." autofocus>
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const typingDiv = document.getElementById('typing');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        let isLoading = false;
        let threadId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
        let runId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);

        function formatMessage(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = `<div class="bubble">${isUser ? text : formatMessage(text)}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            input.disabled = true;

            addMessage(msg, true);
            input.value = '';
            typingDiv.style.display = 'block';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Gerar novos IDs para cada mensagem
            const messageId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
            
            const requestBody = {
                threadId: threadId,
                runId: runId,
                state: {},
                messages: [
                    {
                        id: messageId,
                        role: "user",
                        content: msg
                    }
                ],
                tools: [],
                context: [],
                forwardedProps: {}
            };

            try {
                const response = await fetch('https://atendente-lanchonete.onrender.com/agui', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                
                let reply = 'Desculpe, não entendi.';
                
                if (data.messages && data.messages.length > 0) {
                    const lastMessage = data.messages[data.messages.length - 1];
                    if (lastMessage.content) {
                        reply = lastMessage.content;
                    }
                } else if (data.content) {
                    reply = data.content;
                } else if (data.response) {
                    reply = data.response;
                } else if (data.message) {
                    reply = data.message;
                } else {
                    reply = JSON.stringify(data);
                }
                
                addMessage(reply, false);
                
                // Atualizar runId para a próxima interação
                if (data.runId) {
                    runId = data.runId;
                } else {
                    runId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
                }
                
            } catch (error) {
                console.error('Erro:', error);
                addMessage('❌ Erro de conexão. Tente novamente.', false);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
                typingDiv.style.display = 'none';
            }
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        addMessage('Olá! 👋 Seja bem-vindo à Lanchonete do Zé!\n\nO que você vai querer hoje? Temos:\n🍟 Batata Frita - R$ 10,00\n🍔 X-Bacon - R$ 16,00\n🥤 Coca-Cola - R$ 6,00\n🥤 Suco Natural - R$ 8,00', false);
    </script>
</body>
</html>
