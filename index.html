<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanchonete do Centro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff7e5e, #feb47b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: #ff6b35;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 14px;
        }

        .user .bubble {
            background: #ff6b35;
            color: white;
            border-radius: 18px 18px 0 18px;
        }

        .bot .bubble {
            background: #e9ecef;
            color: #333;
            border-radius: 18px 18px 18px 0;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }

        .input-area button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-area button:hover {
            background: #e55a2b;
        }

        .typing {
            font-size: 12px;
            color: #999;
            padding: 10px 20px;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="header">
            <h1>🍔 Lanchonete do Zé</h1>
            <p>Atendente Virtual 24h</p>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing" id="typing">🤖 Digitando...</div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Digite seu pedido...">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const typingDiv = document.getElementById('typing');
        const input = document.getElementById('input');

        typingDiv.style.display = 'none';

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            input.value = '';
            typingDiv.style.display = 'block';

            try {
                const response = await fetch('https://atendente-lanchonete.onrender.com/agui', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: msg }] })
                });
                const data = await response.json();
                const reply = data.response || data.message || 'Pedido confirmado!';
                addMessage(reply, false);
            } catch (error) {
                addMessage('Erro de conexão. Tente novamente.', false);
            }
            typingDiv.style.display = 'none';
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        addMessage('Olá! 👋 O que você vai querer hoje? Temos batata frita, X-Bacon, refrigerante, suco...', false);
    </script>
</body>

</html>
