<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lanchonete do Zé - Atendente Virtual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Fundo neutro profissional: cinza escuro com tom quente */
            background: linear-gradient(135deg, #2c3e50 0%, #1a2632 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .chat-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }
        /* Header e botões com laranja/vermelho profissional (tom de lanchonete) */
        .header {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 4px; }
        .header p { font-size: 12px; opacity: 0.9; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        /* Bolha do usuário na mesma cor profissional */
        .user .bubble {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        .input-area {
            display: flex;
            padding: 16px;
            background: white;
            border-top: 1px solid #eee;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        .input-area input:focus { border-color: #e67e22; }
        .input-area button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .input-area button:disabled { opacity: 0.6; cursor: not-allowed; }
        .typing { font-size: 12px; color: #999; padding: 8px 20px 12px 20px; display: none; }
        .header-controls { display: flex; justify-content: flex-end; padding: 5px 20px; background: rgba(0,0,0,0.1); }
        .clear-history { background: none; border: none; color: white; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>🍔 Lanchonete do Zé</h1>
            <p>Atendente Virtual 24h</p>
        </div>
        <div class="header-controls">
            <button class="clear-history" onclick="clearHistory()">🗑️ Limpar histórico</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing" id="typing">🤖 Digitando...</div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Digite seu pedido..." autofocus>
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const typingDiv = document.getElementById('typing');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        let isLoading = false;
        
        // Memória persistente
        let threadId = localStorage.getItem('threadId');
        if (!threadId) {
            threadId = "frontend-" + Date.now();
            localStorage.setItem('threadId', threadId);
        }
        
        // Carregar histórico de mensagens
        let messageHistory = [];
        const savedHistory = localStorage.getItem('messageHistory');
        if (savedHistory) {
            messageHistory = JSON.parse(savedHistory);
        }

        function saveMessageToHistory(role, content) {
            messageHistory.push({ role, content, timestamp: Date.now() });
            // Manter apenas últimas 100 mensagens
            if (messageHistory.length > 100) {
                messageHistory = messageHistory.slice(-100);
            }
            localStorage.setItem('messageHistory', JSON.stringify(messageHistory));
        }

        function clearHistory() {
            messageHistory = [];
            localStorage.removeItem('messageHistory');
            localStorage.removeItem('threadId');
            messagesDiv.innerHTML = '';
            threadId = "frontend-" + Date.now();
            localStorage.setItem('threadId', threadId);
            addMessage('Olá! 👋 Seja bem-vindo à Lanchonete do Zé!\n\nO que você vai querer hoje?', false);
            saveMessageToHistory('assistant', 'Olá! 👋 Seja bem-vindo à Lanchonete do Zé!\n\nO que você vai querer hoje?');
        }

        function formatMessage(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = `<div class="bubble">${isUser ? text : formatMessage(text)}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Carregar histórico ao iniciar
        function loadHistory() {
            for (const msg of messageHistory) {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user' : 'bot'}`;
                div.innerHTML = `<div class="bubble">${msg.role === 'user' ? msg.content : formatMessage(msg.content)}</div>`;
                messagesDiv.appendChild(div);
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            input.disabled = true;

            addMessage(msg, true);
            saveMessageToHistory('user', msg);
            input.value = '';
            typingDiv.style.display = 'block';
            
            const currentRunId = "run-" + Date.now();
            const messageId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();

            const requestBody = {
                threadId: threadId,
                runId: currentRunId,
                messages: [
                    {
                        id: messageId,
                        role: "user",
                        content: msg
                    }
                ],
                state: {},
                tools: [],
                context: [],
                forwardedProps: {}
            };

            try {
                const response = await fetch('https://atendente-lanchonete.onrender.com/agui', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const responseText = await response.text();
                
                let fullReply = '';
                const lines = responseText.split('\n');
                
                let botMessageAdded = false;
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const jsonStr = line.substring(6);
                            if (jsonStr.trim() === '') continue;
                            const event = JSON.parse(jsonStr);
                            
                            if (event.type === 'TEXT_MESSAGE_CONTENT' && event.delta) {
                                fullReply += event.delta;
                                if (!botMessageAdded) {
                                    addMessage(fullReply, false);
                                    botMessageAdded = true;
                                } else {
                                    const lastMessage = messagesDiv.lastChild;
                                    if (lastMessage && lastMessage.classList.contains('bot')) {
                                        lastMessage.querySelector('.bubble').innerHTML = formatMessage(fullReply);
                                    }
                                }
                                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
                
                if (fullReply) {
                    saveMessageToHistory('assistant', fullReply);
                } else {
                    const errorMsg = 'Desculpe, não entendi. Pode repetir?';
                    addMessage(errorMsg, false);
                    saveMessageToHistory('assistant', errorMsg);
                }
                
            } catch (error) {
                console.error('Erro:', error);
                const errorMsg = '❌ Erro de conexão. Tente novamente.';
                addMessage(errorMsg, false);
                saveMessageToHistory('assistant', errorMsg);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
                typingDiv.style.display = 'none';
            }
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // Inicializar
        if (messageHistory.length === 0) {
            addMessage('Olá! 👋 Seja bem-vindo à Lanchonete do Zé!\n\nO que você vai querer hoje?', false);
            saveMessageToHistory('assistant', 'Olá! 👋 Seja bem-vindo à Lanchonete do Zé!\n\nO que você vai querer hoje?');
        } else {
            loadHistory();
        }
    </script>
</body>
</html>
