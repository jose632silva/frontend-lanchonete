<body>
    <div class="chat-container">
        <div class="header">
            <h1>🍔 Lanchonete da Lú</h1>
            <p>Atendente Virtual 24h</p>
        </div>
        <div class="header-controls">
            <button class="clear-history" onclick="clearHistory()">🗑️ Limpar histórico</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing" id="typing">🤖 Digitando...</div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Digite seu pedido..." autofocus>
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const typingDiv = document.getElementById('typing');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        let isLoading = false;
        
        // Memória persistente
        let threadId = localStorage.getItem('threadId');
        if (!threadId) {
            threadId = "frontend-" + Date.now();
            localStorage.setItem('threadId', threadId);
        }
        
        // Carregar histórico de mensagens
        let messageHistory = [];
        const savedHistory = localStorage.getItem('messageHistory');
        if (savedHistory) {
            messageHistory = JSON.parse(savedHistory);
        }

        function saveMessageToHistory(role, content) {
            messageHistory.push({ role, content, timestamp: Date.now() });
            // Manter apenas últimas 100 mensagens
            if (messageHistory.length > 100) {
                messageHistory = messageHistory.slice(-100);
            }
            localStorage.setItem('messageHistory', JSON.stringify(messageHistory));
        }

        function clearHistory() {
            messageHistory = [];
            localStorage.removeItem('messageHistory');
            localStorage.removeItem('threadId');
            messagesDiv.innerHTML = '';
            threadId = "frontend-" + Date.now();
            localStorage.setItem('threadId', threadId);
            addMessage('Olá! 👋 Seja bem-vindo à Lanchonete do Lú!\n\nO que você vai querer hoje?', false);
            saveMessageToHistory('assistant', 'Olá! 👋 Seja bem-vindo à Lanchonete do Lú!\n\nO que você vai querer hoje?');
        }

        function formatMessage(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = `<div class="bubble">${isUser ? text : formatMessage(text)}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Carregar histórico ao iniciar
        function loadHistory() {
            for (const msg of messageHistory) {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user' : 'bot'}`;
                div.innerHTML = `<div class="bubble">${msg.role === 'user' ? msg.content : formatMessage(msg.content)}</div>`;
                messagesDiv.appendChild(div);
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            input.disabled = true;

            addMessage(msg, true);
            saveMessageToHistory('user', msg);
            input.value = '';
            typingDiv.style.display = 'block';
            
            const currentRunId = "run-" + Date.now();
            const messageId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();

            const requestBody = {
                threadId: threadId,
                runId: currentRunId,
                messages: [
                    {
                        id: messageId,
                        role: "user",
                        content: msg
                    }
                ],
                state: {},
                tools: [],
                context: [],
                forwardedProps: {}
            };

            try {
                const response = await fetch('https://atendente-lanchonete.onrender.com/agui', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const responseText = await response.text();
                
                let fullReply = '';
                const lines = responseText.split('\n');
                
                let botMessageAdded = false;
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const jsonStr = line.substring(6);
                            if (jsonStr.trim() === '') continue;
                            const event = JSON.parse(jsonStr);
                            
                            if (event.type === 'TEXT_MESSAGE_CONTENT' && event.delta) {
                                fullReply += event.delta;
                                if (!botMessageAdded) {
                                    addMessage(fullReply, false);
                                    botMessageAdded = true;
                                } else {
                                    const lastMessage = messagesDiv.lastChild;
                                    if (lastMessage && lastMessage.classList.contains('bot')) {
                                        lastMessage.querySelector('.bubble').innerHTML = formatMessage(fullReply);
                                    }
                                }
                                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
                
                if (fullReply) {
                    saveMessageToHistory('assistant', fullReply);
                } else {
                    const errorMsg = 'Desculpe, não entendi. Pode repetir?';
                    addMessage(errorMsg, false);
                    saveMessageToHistory('assistant', errorMsg);
                }
                
            } catch (error) {
                console.error('Erro:', error);
                const errorMsg = '❌ Erro de conexão. Tente novamente.';
                addMessage(errorMsg, false);
                saveMessageToHistory('assistant', errorMsg);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
                typingDiv.style.display = 'none';
            }
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // Inicializar
        if (messageHistory.length === 0) {
            addMessage('Olá! 👋 Seja bem-vindo à Lanchonete do Lú!\n\nO que você vai querer hoje?', false);
            saveMessageToHistory('assistant', 'Olá! 👋 Seja bem-vindo à Lanchonete do Lú!\n\nO que você vai querer hoje?');
        } else {
            loadHistory();
        }

        // Keep-alive: ping a cada 1 minuto enquanto a página estiver aberta
setInterval(() => {
    fetch('https://atendente-lanchonete.onrender.com', { method: 'HEAD', cache: 'no-store' })
        .catch(() => {});
}, 300000);




    </script>
</body>
    
</html>

      color: var(--text);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ─── MAIN SHELL ─── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ─── HEADER ─── */
    .header {
      flex-shrink: 0;
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(180deg, #100f0d 60%, transparent);
      position: relative;
      z-index: 10;
    }
    .logo-wrap {
      width: 52px; height: 52px;
      border-radius: 16px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 16px;
      display: none; /* shown via JS if src set */
    }
    .header-text { flex: 1; }
    .brand-name {
      font-family: var(--font-brand);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1;
    }
    .brand-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .header-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: #4caf7d; font-weight: 600;
    }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%; background: #4caf7d;
      animation: pulse-green 2s infinite;
    }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(76,175,125,0.5); }
      50% { box-shadow: 0 0 0 5px rgba(76,175,125,0); }
    }

    /* ─── CAROUSEL SECTION ─── */
    .carousel-section {
      flex-shrink: 0;
      padding: 0 0 18px;
    }
    .carousel-label {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted); letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0 24px 12px;
    }
    .carousel-track {
      display: flex;
      gap: 12px;
      padding: 4px 24px 8px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .carousel-track::-webkit-scrollbar { display: none; }

    .product-card {
      flex-shrink: 0;
      width: 130px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 12px 12px;
      cursor: pointer;
      scroll-snap-align: start;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .product-card:active {
      transform: scale(0.95);
    }
    .product-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(0,0,0,0.4);
    }
    .product-emoji {
      font-size: 32px;
      display: block;
      margin-bottom: 8px;
      line-height: 1;
    }
    .product-name {
      font-size: 12px; font-weight: 600;
      color: var(--text); line-height: 1.3;
      margin-bottom: 4px;
    }
    .product-price {
      font-family: var(--font-brand);
      font-size: 13px; font-weight: 600;
      color: var(--accent);
    }
    .product-card.adding {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent), 0 0 30px var(--accent-glow);
    }

    /* ─── DIVIDER ─── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 24px;
      flex-shrink: 0;
    }

    /* ─── CHAT AREA ─── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

    /* ─── MESSAGES ─── */
    .msg {
      display: flex;
      flex-direction: column;
      animation: msg-in 0.28s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .msg.user { align-items: flex-end; }
    .msg.bot  { align-items: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 11px 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #1a0e00;
      font-weight: 500;
      border-radius: 18px 18px 4px 18px;
    }
    .msg.bot .bubble {
      background: var(--bot-bubble);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px 18px 18px 18px;
    }
    .bubble strong { color: var(--accent); font-weight: 600; }

    .typing-indicator {
      display: none;
      align-items: center; gap: 5px;
      padding: 12px 16px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 4px 18px 18px 18px;
      width: fit-content;
      animation: msg-in 0.28s cubic-bezier(.16,1,.3,1) both;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      animation: typing-bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing-bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── INPUT BAR ─── */
    .input-bar {
      flex-shrink: 0;
      padding: 12px 16px 20px;
      background: linear-gradient(0deg, #100f0d 70%, transparent);
      position: relative; z-index: 10;
    }
    .input-inner {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 8px 8px 8px 18px;
      transition: border-color 0.2s;
    }
    .input-inner:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 100px;
      min-height: 24px;
      padding: 4px 0;
    }
    .msg-input::placeholder { color: var(--text-muted); }

    .icon-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s ease;
      flex-shrink: 0;
    }
    .icon-btn:active { transform: scale(0.9); }
    .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .mic-btn {
      background: var(--surface2);
      color: var(--text-muted);
    }
    .mic-btn:hover { background: var(--accent-glow); color: var(--accent); }
    .mic-btn.recording {
      background: #c0392b;
      color: white;
      animation: mic-pulse 1s infinite;
    }
    @keyframes mic-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.5); }
      50%      { box-shadow: 0 0 0 8px rgba(192,57,43,0); }
    }

    .send-btn {
      background: var(--accent);
      color: #1a0e00;
    }
    .send-btn:hover { background: #e8920d; }
    .send-btn svg { transition: transform 0.15s; }
    .send-btn:not(:disabled):hover svg { transform: translateX(2px) translateY(-2px); }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--accent);
      color: var(--accent); font-size: 13px; font-weight: 500;
      padding: 8px 16px; border-radius: 24px;
      opacity: 0; pointer-events: none;
      transition: all 0.3s ease; z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }

    /* ─── CLEAR BTN ─── */
    .clear-btn {
      position: absolute; top: 22px; right: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 11px; font-weight: 500;
      padding: 5px 10px; border-radius: 20px; cursor: pointer;
      font-family: var(--font-ui);
      transition: all 0.15s;
    }
    .clear-btn:hover { border-color: var(--text-muted); color: var(--text); }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; text-align: center; padding: 20px;
      color: var(--text-muted);
    }
    .empty-state .big-icon { font-size: 40px; margin-bottom: 4px; }
    .empty-state p { font-size: 14px; max-width: 200px; line-height: 1.5; }

    /* ─── MIC MODAL overlay ─── */
    .mic-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 50;
      background: rgba(16,15,13,0.85);
      backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
    }
    .mic-overlay.active { display: flex; }
    .mic-wave {
      width: 80px; height: 80px; border-radius: 50%;
      background: #c0392b;
      display: flex; align-items: center; justify-content: center;
      animation: mic-pulse 1s infinite;
    }
    .mic-overlay-label {
      font-size: 16px; font-weight: 500; color: var(--text);
    }
    .mic-overlay-sub {
      font-size: 13px; color: var(--text-muted);
    }
    .mic-cancel {
      margin-top: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-ui); font-size: 14px;
      padding: 10px 24px; border-radius: 24px; cursor: pointer;
      transition: all 0.15s;
    }
    .mic-cancel:hover { border-color: var(--text-muted); }

    /* ─── SAFE AREA ─── */
    @supports (padding: env(safe-area-inset-bottom)) {
      .input-bar { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>

<div class="toast" id="toast"></div>

<div class="shell">

  <!-- HEADER -->
  <header class="header">

  <!-- PRODUCT CAROUSEL -->
  <section class="carousel-section">

    <div class="carousel-track" id="carouselTrack">
      <!-- cards injected by JS -->
    </div>

  <div class="divider"></div>

  <!-- CHAT -->
  <main class="chat-area" id="chatArea">
    <div class="typing-indicator" id="typingIndicator">

  <!-- INPUT BAR -->
  <footer class="input-bar">
    <div class="input-inner">
      <textarea
        class="msg-input"
        id="msgInput"

      <button class="icon-btn mic-btn" id="micBtn" title="Falar pedido" onclick="toggleRecording()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>

          <line x1="8" y1="23" x2="16" y2="23"/>

      </button>
      <button class="icon-btn send-btn" id="sendBtn" title="Enviar" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </footer>
</div>

<script>
/* ══════════════════════════════════════════════
   PRODUCTS — edit here to match your real menu
══════════════════════════════════════════════ */
const PRODUCTS = [
  { emoji: '🍔', name: 'X-Burguer',   price: 'R$ 18,90', msg: 'Quero um X-Burguer' },
  { emoji: '🥓', name: 'X-Bacon',     price: 'R$ 22,90', msg: 'Quero um X-Bacon' },
  { emoji: '🍳', name: 'X-Egg',       price: 'R$ 20,90', msg: 'Quero um X-Egg' },
  { emoji: '🌭', name: 'Hot Dog',      price: 'R$ 14,90', msg: 'Quero um Hot Dog' },
  { emoji: '🥪', name: 'Misto Quente', price: 'R$ 10,90', msg: 'Quero um Misto Quente' },
  { emoji: '🍟', name: 'Batata Frita', price: 'R$ 12,90', msg: 'Quero batata frita' },
  { emoji: '🥤', name: 'Refrigerante', price: 'R$  7,90', msg: 'Quero um refrigerante' },
  { emoji: '🥛', name: 'Milk Shake',   price: 'R$ 16,90', msg: 'Quero um milk shake' },
];

/* ══════════════════════════════════════════════
   BACKEND CONFIG  (same as original)
══════════════════════════════════════════════ */
const API_URL = 'https://atendente-lanchonete.onrender.com/agui';

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let isLoading = false;
let recognition = null;
let isRecording = false;

/* threadId format identical to original working code */
let threadId = localStorage.getItem('lu_threadId');
if (!threadId) {
  threadId = 'frontend-' + Date.now();
  localStorage.setItem('lu_threadId', threadId);
}

let history = [];
try { history = JSON.parse(localStorage.getItem('lu_history') || '[]'); } catch {}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
const chatArea        = document.getElementById('chatArea');
const msgInput        = document.getElementById('msgInput');
const sendBtn         = document.getElementById('sendBtn');
const micBtn          = document.getElementById('micBtn');
const typingIndicator = document.getElementById('typingIndicator');
const micOverlay      = document.getElementById('micOverlay');
const toastEl         = document.getElementById('toast');

function init() {
  buildCarousel();
  setupTextareaAutoResize();
  if (history.length === 0) {
    appendBotMessage('Olá! 👋 Bem-vindo à **Lanchonete da Lú**!\n\nEscolha um item do cardápio acima ou me diga o que você deseja. Posso ajudar com pedidos, preços e informações. 😊');
    saveHistory('assistant', 'Olá! 👋 Bem-vindo à Lanchonete da Lú!\n\nEscolha um item do cardápio acima ou me diga o que você deseja.');
  } else {
    history.forEach(m => {
      if (m.role === 'user') appendUserMessage(m.content, false);
      else appendBotMessage(m.content, false);
    });
  }
  keepAlive();
}

/* ══════════════════════════════════════════════
   CAROUSEL
══════════════════════════════════════════════ */
function buildCarousel() {
  const track = document.getElementById('carouselTrack');
  PRODUCTS.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <span class="product-emoji">${p.emoji}</span>
      <div class="product-name">${p.name}</div>
      <div class="product-price">${p.price}</div>
    `;
    card.addEventListener('click', () => orderProduct(card, p));
    track.appendChild(card);
  });
}

function orderProduct(card, p) {
  if (isLoading) return;
  card.classList.add('adding');
  setTimeout(() => card.classList.remove('adding'), 600);
  sendText(p.msg);
}

/* ══════════════════════════════════════════════
   TEXTAREA AUTO-RESIZE
══════════════════════════════════════════════ */
function setupTextareaAutoResize() {
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

/* ══════════════════════════════════════════════
   SEND
══════════════════════════════════════════════ */
function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isLoading) return;
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendText(text);
}

async function sendText(text) {
  if (!text || isLoading) return;
  setLoading(true);
  appendUserMessage(text);
  saveHistory('user', text);
  showTyping(true);

  const runId = 'run-' + Date.now();
  const msgId = (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString());

  const body = {
    threadId,
    runId,
    messages: [{ id: msgId, role: 'user', content: text }],
    state: {},
    tools: [],
    context: [],
    forwardedProps: {}
  };

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const errBody = await resp.text().catch(() => '');
      console.error('HTTP', resp.status, errBody);
      throw new Error('HTTP ' + resp.status + ' — ' + errBody.slice(0, 120));
    }

    const raw   = await resp.text();
    let reply   = '';
    let botNode = null;

    for (const line of raw.split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const jsonStr = line.substring(6).trim();
      if (!jsonStr) continue;
      try {
        const ev = JSON.parse(jsonStr);
        if (ev.type === 'TEXT_MESSAGE_CONTENT' && ev.delta) {
          reply += ev.delta;
          showTyping(false);
          if (!botNode) botNode = appendBotMessage(reply);
          else updateBotMessage(botNode, reply);
        }
      } catch (pe) { console.warn('SSE parse:', pe, jsonStr); }
    }

    if (reply) {
      saveHistory('assistant', reply);
    } else {
      showTyping(false);
      console.warn('Empty reply. Raw:', raw.slice(0, 500));
      appendBotMessage('Desculpe, não entendi. Pode repetir?');
    }

  } catch (err) {
    showTyping(false);
    appendBotMessage('❌ ' + (err.message || 'Falha de conexão') + '. Verifique o console (F12).');
    console.error('[sendText]', err);
  } finally {
    setLoading(false);
  }
}

/* ══════════════════════════════════════════════
   MESSAGE RENDERING
══════════════════════════════════════════════ */
function formatBotText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function appendUserMessage(text, animate = true) {
  const div = document.createElement('div');
  div.className = 'msg user' + (animate ? '' : ' no-anim');
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chatArea.insertBefore(div, typingIndicator);
  scrollChat();
  return div;
}

function appendBotMessage(text, animate = true) {
  const div = document.createElement('div');
  div.className = 'msg bot' + (animate ? '' : ' no-anim');
  div.innerHTML = `<div class="bubble">${formatBotText(text)}</div>`;
  chatArea.insertBefore(div, typingIndicator);
  scrollChat();
  return div;
}

function updateBotMessage(node, text) {
  node.querySelector('.bubble').innerHTML = formatBotText(text);
  scrollChat();
}

function scrollChat() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

function showTyping(visible) {
  typingIndicator.classList.toggle('visible', visible);
  if (visible) scrollChat();
}

function setLoading(state) {
  isLoading = state;
  sendBtn.disabled = state;
  msgInput.disabled = state;
  if (!state) msgInput.focus();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══════════════════════════════════════════════
   HISTORY
══════════════════════════════════════════════ */
function saveHistory(role, content) {
  history.push({ role, content });
  if (history.length > 100) history = history.slice(-100);
  try { localStorage.setItem('lu_history', JSON.stringify(history)); } catch {}
}

function clearHistory() {
  history = [];
  localStorage.removeItem('lu_history');
  localStorage.removeItem('lu_threadId');
  threadId = 'lu-' + Date.now();
  localStorage.setItem('lu_threadId', threadId);
  // clear chat (keep typing indicator)
  [...chatArea.children].forEach(c => {
    if (c !== typingIndicator) c.remove();
  });
  appendBotMessage('Olá! 👋 Novo atendimento iniciado!\n\nO que você deseja pedir?');
  saveHistory('assistant', 'Novo atendimento iniciado.');
}

/* ══════════════════════════════════════════════
   VOICE INPUT (Web Speech API)
══════════════════════════════════════════════ */
function toggleRecording() {
  if (isRecording) stopRecording();
  else startRecording();
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('Microfone não suportado neste navegador');
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    micOverlay.classList.add('active');
  };

  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    stopRecording();
    msgInput.value = transcript;
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
    // auto-send
    sendMessage();
  };

  recognition.onerror = err => {
    stopRecording();
    if (err.error !== 'aborted') showToast('Não foi possível capturar áudio');
  };

  recognition.onend = () => stopRecording();

  recognition.start();
}

function stopRecording() {
  isRecording = false;
  micBtn.classList.remove('recording');
  micOverlay.classList.remove('active');
  if (recognition) { try { recognition.abort(); } catch {} recognition = null; }
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

/* ══════════════════════════════════════════════
   KEEP-ALIVE (ping do servidor Render)
══════════════════════════════════════════════ */
function keepAlive() {
  setInterval(() => {
    fetch('https://atendente-lanchonete.onrender.com', { method: 'HEAD', cache: 'no-store' }).catch(() => {});
  }, 60000);
}

/* ══════════════════════════════════════════════
   START
══════════════════════════════════════════════ */
init();
</script>
