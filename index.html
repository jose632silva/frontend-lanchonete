<body>
    <div class="chat-container">
        <div class="header">
            <h1>🍔 Lanchonete da Lú</h1>
            <p>Atendente Virtual 24h</p>
        </div>
        <div class="header-controls">
            <button class="clear-history" onclick="clearHistory()">🗑️ Limpar histórico</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing" id="typing">🤖 Digitando...</div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Digite seu pedido..." autofocus>
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const typingDiv = document.getElementById('typing');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        let isLoading = false;
        
        // Memória persistente
        let threadId = localStorage.getItem('threadId');
        if (!threadId) {
            threadId = "frontend-" + Date.now();
            localStorage.setItem('threadId', threadId);
        }
        
        // Carregar histórico de mensagens
        let messageHistory = [];
        const savedHistory = localStorage.getItem('messageHistory');
        if (savedHistory) {
            messageHistory = JSON.parse(savedHistory);
        }

        function saveMessageToHistory(role, content) {
            messageHistory.push({ role, content, timestamp: Date.now() });
            // Manter apenas últimas 100 mensagens
            if (messageHistory.length > 100) {
                messageHistory = messageHistory.slice(-100);
            }
            localStorage.setItem('messageHistory', JSON.stringify(messageHistory));
        }

        function clearHistory() {
            messageHistory = [];
            localStorage.removeItem('messageHistory');
            localStorage.removeItem('threadId');
            messagesDiv.innerHTML = '';
            threadId = "frontend-" + Date.now();
            localStorage.setItem('threadId', threadId);
            addMessage('Olá! 👋 Seja bem-vindo à Lanchonete do Lú!\n\nO que você vai querer hoje?', false);
            saveMessageToHistory('assistant', 'Olá! 👋 Seja bem-vindo à Lanchonete do Lú!\n\nO que você vai querer hoje?');
        }

        function formatMessage(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = `<div class="bubble">${isUser ? text : formatMessage(text)}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Carregar histórico ao iniciar
        function loadHistory() {
            for (const msg of messageHistory) {
                const div = document.createElement('div');
                div.className = `message ${msg.role === 'user' ? 'user' : 'bot'}`;
                div.innerHTML = `<div class="bubble">${msg.role === 'user' ? msg.content : formatMessage(msg.content)}</div>`;
                messagesDiv.appendChild(div);
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;
            input.disabled = true;

            addMessage(msg, true);
            saveMessageToHistory('user', msg);
            input.value = '';
            typingDiv.style.display = 'block';
            
            const currentRunId = "run-" + Date.now();
            const messageId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();

            const requestBody = {
                threadId: threadId,
                runId: currentRunId,
                messages: [
                    {
                        id: messageId,
                        role: "user",
                        content: msg
                    }
                ],
                state: {},
                tools: [],
                context: [],
                forwardedProps: {}
            };

            try {
                const response = await fetch('https://atendente-lanchonete.onrender.com/agui', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const responseText = await response.text();
                
                let fullReply = '';
                const lines = responseText.split('\n');
                
                let botMessageAdded = false;
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const jsonStr = line.substring(6);
                            if (jsonStr.trim() === '') continue;
                            const event = JSON.parse(jsonStr);
                            
                            if (event.type === 'TEXT_MESSAGE_CONTENT' && event.delta) {
                                fullReply += event.delta;
                                if (!botMessageAdded) {
                                    addMessage(fullReply, false);
                                    botMessageAdded = true;
                                } else {
                                    const lastMessage = messagesDiv.lastChild;
                                    if (lastMessage && lastMessage.classList.contains('bot')) {
                                        lastMessage.querySelector('.bubble').innerHTML = formatMessage(fullReply);
                                    }
                                }
                                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
                
                if (fullReply) {
                    saveMessageToHistory('assistant', fullReply);
                } else {
                    const errorMsg = 'Desculpe, não entendi. Pode repetir?';
                    addMessage(errorMsg, false);
                    saveMessageToHistory('assistant', errorMsg);
                }
                
            } catch (error) {
                console.error('Erro:', error);
                const errorMsg = '❌ Erro de conexão. Tente novamente.';
                addMessage(errorMsg, false);
                saveMessageToHistory('assistant', errorMsg);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
                typingDiv.style.display = 'none';
            }
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // Inicializar
        if (messageHistory.length === 0) {
            addMessage('Olá! 👋 Seja bem-vindo à Lanchonete do Lú!\n\nO que você vai querer hoje?', false);
            saveMessageToHistory('assistant', 'Olá! 👋 Seja bem-vindo à Lanchonete do Lú!\n\nO que você vai querer hoje?');
        } else {
            loadHistory();
        }

        // Keep-alive: ping a cada 1 minuto enquanto a página estiver aberta
setInterval(() => {
    fetch('https://atendente-lanchonete.onrender.com', { method: 'HEAD', cache: 'no-store' })
        .catch(() => {});
}, 300000);




    </script>
</body>
    
</html>

    .header{
      flex-shrink:0;
      padding:20px 20px 0;
      position:relative;z-index:10;
    }
    .header-top{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:22px;
    }
    .logo-zone{display:flex;align-items:center;gap:12px;}
    .logo-box{
      width:50px;height:50px;border-radius:15px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;align-items:center;justify-content:center;
      font-size:26px;flex-shrink:0;
      box-shadow:0 4px 20px var(--glow);
      overflow:hidden;
    }
    .logo-box img{width:100%;height:100%;object-fit:cover;display:none;}
    .logo-name{
      font-family:var(--font-title);font-size:18px;font-weight:800;
      color:var(--text);letter-spacing:-.3px;line-height:1;
    }
    .logo-tag{
      font-size:11px;font-weight:500;color:var(--accent);
      letter-spacing:.06em;text-transform:uppercase;margin-top:3px;
    }
    .status-pill{
      display:flex;align-items:center;gap:6px;
      background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.22);
      border-radius:24px;padding:5px 12px;
      font-size:11px;font-weight:600;color:var(--green);
    }
    .sdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

    .greeting{
      font-family:var(--font-title);font-size:20px;font-weight:600;
      line-height:1.15;margin-bottom:4px;
    }
    .greeting span{color:var(--accent);}
    .greeting-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}

    /* CAROUSEL */
    .carousel-wrap{flex-shrink:0;padding-bottom:18px;position:relative;overflow:hidden;}
    .carousel-wrap::before,
    .carousel-wrap::after{
      content:'';position:absolute;top:0;bottom:0;width:52px;z-index:3;pointer-events:none;
    }
    .carousel-wrap::before{left:0;background:linear-gradient(to right,var(--bg),transparent);}
    .carousel-wrap::after{right:0;background:linear-gradient(to left,var(--bg),transparent);}

    .clabel{
      font-size:11px;font-weight:600;color:var(--muted);
      letter-spacing:.08em;text-transform:uppercase;
      padding:0 20px 12px;
    }

    .scroll-outer{
      overflow-x:auto;overflow-y:hidden;
      padding:2px 0 6px;
      scrollbar-width:none;
      -webkit-overflow-scrolling:touch;
      cursor:grab;
    }
    .scroll-outer::-webkit-scrollbar{display:none;}
    .scroll-outer.dragging{cursor:grabbing;}
    .scroll-track{
      display:flex;gap:12px;width:max-content;
    }

    .pcard{
      width:138px;flex-shrink:0;
      background:var(--card);border:1px solid var(--border);
      border-radius:20px;padding:12px 8px 12px;
      cursor:pointer;position:relative;overflow:hidden;
      user-select:none;-webkit-tap-highlight-color:transparent;
      transition:border-color .2s,box-shadow .2s,transform .15s;
      display:flex;flex-direction:column;align-items:center;gap:6px;
    }
    .pcard::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,transparent 55%,rgba(255,107,53,.07));
      pointer-events:none;
    }
    .pcard:active{transform:scale(.93);}
    .pcard:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 28px rgba(0,0,0,.5);}
    
    .pcard-img{
      width:100px;height:100px;border-radius:16px;
      object-fit:cover;background:var(--card2);
      display:block;margin-bottom:6px;
    }
    .pcard-name{
      font-size:12px;font-weight:600;color:var(--text);
      text-align:center;line-height:1.3;margin:4px 0 2px;
    }
    .pcard-price{
      font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--accent);
    }
    .pcard-cta{
      position:absolute;top:10px;right:10px;
      background:var(--accent);color:#fff;
      font-size:9px;font-weight:700;
      padding:2px 7px;border-radius:8px;
      opacity:0;transition:opacity .18s;
    }
    .pcard:hover .pcard-cta{opacity:1;}
    .pcard.flash{
      border-color:var(--accent);
      box-shadow:0 0 0 2px var(--accent),0 0 40px var(--glow);
    }
    /* fallback para imagens quebradas */
    .pcard-img-error {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card2);
      font-size: 36px;
    }

    /* SEPARATOR */
    .sep{height:1px;background:var(--border);margin:0 20px;flex-shrink:0;}

    /* CHAT */
    .chat{
      flex:1;overflow-y:auto;padding:14px 16px 8px;
      display:flex;flex-direction:column;gap:9px;
      scrollbar-width:thin;scrollbar-color:var(--card2) transparent;
    }
    .chat::-webkit-scrollbar{width:3px;}
    .chat::-webkit-scrollbar-thumb{background:var(--card2);border-radius:2px;}

    .msg{display:flex;flex-direction:column;animation:msgIn .25s cubic-bezier(.16,1,.3,1) both;}
    @keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .msg.user{align-items:flex-end;}
    .msg.bot {align-items:flex-start;}

    .bubble{
      max-width:100%;
      width:100%;
      padding:10px 15px;
      font-size:14px;
      line-height:1.55;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .msg.user .bubble{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;font-weight:500;
      border-radius:18px 18px 4px 18px;
    }
    .msg.bot .bubble{
      background:var(--card);color:var(--text);
      border:1px solid var(--border);
      border-radius:4px 18px 18px 18px;
    }
    .bubble strong{color:var(--accent2);}

    .typing{
      display:none;align-items:center;gap:5px;
      padding:11px 15px;background:var(--card);
      border:1px solid var(--border);
      border-radius:4px 18px 18px 18px;width:fit-content;
    }
    .typing.on{display:flex;}
    .tdot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:td 1.2s infinite ease-in-out;}
    .tdot:nth-child(2){animation-delay:.15s;}
    .tdot:nth-child(3){animation-delay:.3s;}
    @keyframes td{0%,80%,100%{transform:translateY(0);opacity:.4;}50%{transform:translateY(-5px);opacity:1;}}

    /* INPUT BAR */
    .bar{
      flex-shrink:0;padding:10px 16px 24px;
      background:linear-gradient(0deg,#0a0a0a 65%,transparent);
    }
    .bar-inner{
      display:flex;align-items:flex-end;gap:8px;
      background:var(--card);border:1.5px solid var(--border);
      border-radius:26px;padding:8px 8px 8px 16px;
      transition:border-color .2s,box-shadow .2s;
    }
    .bar-inner:focus-within{
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--glow);
    }
    textarea.ti{
      flex:1;background:none;border:none;outline:none;
      color:var(--text);font-family:var(--font-body);font-size:15px;
      line-height:1.5;resize:none;max-height:96px;min-height:24px;padding:4px 0;
    }
    textarea.ti::placeholder{color:var(--muted);}

    .ibtn{
      width:40px;height:40px;border-radius:50%;border:none;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:all .18s;
    }
    .ibtn:active{transform:scale(.88);}
    .ibtn:disabled{opacity:.3;cursor:not-allowed;}

    .mic-btn{background:var(--card2);color:var(--muted);}
    .mic-btn:hover{background:rgba(255,107,53,.15);color:var(--accent);}
    .mic-btn.rec{background:#c0392b;color:#fff;animation:mpulse 1s infinite;}
    @keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.5);}50%{box-shadow:0 0 0 8px rgba(192,57,43,0);}}

    .send-btn{background:var(--accent);color:#fff;}
    .send-btn:hover{background:var(--accent2);}

    /* MIC OVERLAY */
    .mic-ov{
      display:none;position:fixed;inset:0;z-index:60;
      background:rgba(10,10,10,.88);backdrop-filter:blur(16px);
      flex-direction:column;align-items:center;justify-content:center;gap:18px;
    }
    .mic-ov.on{display:flex;}
    .mic-ring{
      width:80px;height:80px;border-radius:50%;background:#c0392b;
      display:flex;align-items:center;justify-content:center;
      animation:mpulse 1s infinite;
    }
    .mic-label{font-family:var(--font-title);font-size:18px;font-weight:700;}
    .mic-sub{font-size:13px;color:var(--muted);}
    .mic-cancel{
      background:var(--card);border:1px solid var(--border);
      color:var(--text);font-family:var(--font-body);
      font-size:14px;padding:10px 26px;border-radius:24px;
      cursor:pointer;margin-top:6px;transition:border-color .15s;
    }
    .mic-cancel:hover{border-color:var(--muted);}

    /* TOAST */
    .toast{
      position:fixed;bottom:88px;left:50%;
      transform:translateX(-50%) translateY(14px);
      background:var(--card);border:1px solid var(--accent);
      color:var(--accent);font-size:12px;font-weight:500;
      padding:7px 16px;border-radius:24px;
      opacity:0;pointer-events:none;transition:all .28s;z-index:80;white-space:nowrap;
    }
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

    @supports (padding:env(safe-area-inset-bottom)){
      .bar{padding-bottom:calc(24px + env(safe-area-inset-bottom));}
    }
  </style>
</head>
<body>

<div class="mic-ov" id="micOv">
  <div class="mic-ring">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </div>
  <div class="mic-label">Ouvindo…</div>
  <div class="mic-sub">Fale seu pedido agora</div>
  <button class="mic-cancel" onclick="stopRec()">Cancelar</button>
</div>

<div class="toast" id="toast"></div>

<div class="shell">

  <header class="header">
    <div class="header-top">
      <div class="logo-zone">
        <div class="logo-box">
          <img id="logoImg" alt="Logo"/>
          <span id="logoEmoji">🍔</span>
        </div>
        <div>
          <div class="logo-name">Chupeta Lanches</div>
          <div class="logo-tag">Atendente Virtual</div>
        </div>
      </div>
      <div class="status-pill"><span class="sdot"></span>Aberto</div>
    </div>
    <div class="greeting">Olá! O que você<br>vai querer <span>hoje?</span></div>
    <div class="greeting-sub">Toque num item ou escreva seu pedido 👇</div>
  </header>

  <section class="carousel-wrap">
    <div class="clabel">Peça rápido</div>
    <div class="scroll-outer">
      <div class="scroll-track" id="scrollTrack"></div>
    </div>
  </section>

  <div class="sep"></div>

  <main class="chat" id="chat">
    <div class="typing" id="typing">
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>
  </main>

  <footer class="bar">
    <div class="bar-inner">
      <textarea class="ti" id="ti" placeholder="Digite seu pedido…" rows="1"></textarea>
      <button class="ibtn mic-btn" id="micBtn" onclick="toggleRec()" title="Falar pedido">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="ibtn send-btn" id="sendBtn" onclick="doSend()" title="Enviar">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </footer>
</div>

<script>
/* ═══════════════════════════════════
   CARDÁPIO — Edite aqui seus produtos
   Cada item: img (URL da imagem), n (nome), p (preço), o (texto do pedido)
═══════════════════════════════════ */
const MENU = [
  { img:'https://buzinaburgers.com/wp-content/uploads/2019/04/xburger.jpg', n:'X-Burguer',    p:'R$ 18,90', o:'Quero um X-Burguer'    },
  { img:'https://www.seara.com.br/wp-content/uploads/2025/09/x-bacon-portal-minha-receita.jpg',   n:'X-Bacon',      p:'R$ 22,90', o:'Quero um X-Bacon'      },
  { img:'https://www.receiteria.com.br/wp-content/uploads/receitas-de-x-egg-3-730x449.jpg',     n:'X-Egg',        p:'R$ 20,90', o:'Quero um X-Egg'        },
  { img:'https://img.freepik.com/premium-photo/hot-dog-with-mustard-it-ketchup-side_807701-4467.jpg',   n:'Hot Dog',      p:'R$ 14,90', o:'Quero um Hot Dog'      },
  { img:'https://2.bp.blogspot.com/-n0BRuB8rVnM/Wwv2pb63PcI/AAAAAAAAM_E/gYTFlGH39zg95nDYtdwPteKhFc8vocccgCLcBGAs/w1200-h630-p-k-no-nu/misto-quente-receita-1.jpeg',     n:'Misto Quente', p:'R$ 10,90', o:'Quero um Misto Quente' },
  { img:'https://www.cenariomt.com.br/wp-content/uploads/2023/04/como-fazer-batata-frita-na-airfryer-1024x576.jpg',    n:'Batata Frita', p:'R$ 12,90', o:'Quero batata frita'    },
  { img:'https://hpg.com.br/wp-content/uploads/2025/12/10-melhores-marcas-de-refrigerante.jpg',     n:'Refrigerante', p:'R$  7,90', o:'Quero um refrigerante' },
  { img:'https://i.pinimg.com/736x/ac/1b/1b/ac1b1b9ee0fc12282a70f6f06d7c8a39.jpg', n:'Milk Shake',   p:'R$ 16,90', o:'Quero um milk shake'   },
];
const API = 'https://atendente-lanchonete.onrender.com/agui';

let busy=false, recog=null, recording=false;

let tid = localStorage.getItem('lu_tid');
if(!tid){ tid='frontend-'+Date.now(); localStorage.setItem('lu_tid',tid); }

let hist=[];
try{ hist=JSON.parse(localStorage.getItem('lu_hist')||'[]'); }catch{}

const chatEl  = document.getElementById('chat');
const tiEl    = document.getElementById('ti');
const sendBtn = document.getElementById('sendBtn');
const micBtn  = document.getElementById('micBtn');
const typEl   = document.getElementById('typing');
const micOv   = document.getElementById('micOv');
const toastEl = document.getElementById('toast');

/* ────────── FUNÇÃO AUXILIAR FALLBACK IMAGEM ────────── */
function handleImageError(imgElement, productName) {
  // Substitui por um emoji representativo como fallback
  const fallbackEmoji = getFallbackEmoji(productName);
  imgElement.style.display = 'none';
  const parent = imgElement.parentElement;
  const fallbackSpan = document.createElement('span');
  fallbackSpan.className = 'pcard-img pcard-img-error';
  fallbackSpan.textContent = fallbackEmoji;
  fallbackSpan.style.fontSize = '48px';
  fallbackSpan.style.display = 'flex';
  fallbackSpan.style.alignItems = 'center';
  fallbackSpan.style.justifyContent = 'center';
  parent.insertBefore(fallbackSpan, imgElement);
  imgElement.remove(); // remove a imagem quebrada
}

function getFallbackEmoji(name) {
  const map = {
    'X-Burguer': '🍔', 'X-Bacon': '🥓🍔', 'X-Egg': '🍳🍔', 'Hot Dog': '🌭',
    'Misto Quente': '🥪', 'Batata Frita': '🍟', 'Refrigerante': '🥤', 'Milk Shake': '🥛🍫'
  };
  return map[name] || '🍽️';
}

/* ────────── CARROSSEL COM IMAGENS E INFINITO ────────── */
let scrollOuter, scrollPaused=false, rafId=null;
const SCROLL_SPEED = 0.5; // px por frame

function buildCarousel(){
  const track=document.getElementById('scrollTrack');
  scrollOuter=track.parentElement;
  
  // Duplica o menu para efeito infinito
  [...MENU, ...MENU].forEach(p => {
    const card = document.createElement('div');
    card.className = 'pcard';
    
    // Criar imagem
    const img = document.createElement('img');
    img.className = 'pcard-img';
    img.src = p.img;
    img.alt = p.n;
    img.loading = 'lazy';
    img.onerror = function() { handleImageError(this, p.n); };
    
    const nameSpan = document.createElement('div');
    nameSpan.className = 'pcard-name';
    nameSpan.textContent = p.n;
    
    const priceSpan = document.createElement('div');
    priceSpan.className = 'pcard-price';
    priceSpan.textContent = p.p;
    
    const ctaSpan = document.createElement('span');
    ctaSpan.className = 'pcard-cta';
    ctaSpan.textContent = 'Pedir';
    
    card.appendChild(img);
    card.appendChild(nameSpan);
    card.appendChild(priceSpan);
    card.appendChild(ctaSpan);
    
    card.addEventListener('click', (e) => {
      if(busy) return;
      card.classList.add('flash');
      setTimeout(()=>card.classList.remove('flash'), 600);
      sendText(p.o);
    });
    
    track.appendChild(card);
  });
  
  requestAnimationFrame(() => {
    startAutoScroll();
    setupDrag();
  });
}

function startAutoScroll(){
  function step(){
    if(!scrollPaused && scrollOuter){
      scrollOuter.scrollLeft += SCROLL_SPEED;
      const half = scrollOuter.scrollWidth / 2;
      if(scrollOuter.scrollLeft >= half) scrollOuter.scrollLeft -= half;
    }
    rafId = requestAnimationFrame(step);
  }
  rafId = requestAnimationFrame(step);
}

function setupDrag(){
  let isDown=false, startX=0, startScroll=0;
  
  // Touch
  scrollOuter.addEventListener('touchstart', e=>{
    scrollPaused=true;
    startX=e.touches[0].pageX;
    startScroll=scrollOuter.scrollLeft;
  },{passive:true});
  scrollOuter.addEventListener('touchmove', e=>{
    const dx=startX - e.touches[0].pageX;
    scrollOuter.scrollLeft=startScroll+dx;
    const half=scrollOuter.scrollWidth/2;
    if(scrollOuter.scrollLeft<0) scrollOuter.scrollLeft+=half;
    if(scrollOuter.scrollLeft>=half) scrollOuter.scrollLeft-=half;
  },{passive:true});
  scrollOuter.addEventListener('touchend',()=>{ scrollPaused=false; });
  
  // Mouse drag
  scrollOuter.addEventListener('mousedown', e=>{
    isDown=true; scrollPaused=true;
    startX=e.pageX; startScroll=scrollOuter.scrollLeft;
    scrollOuter.classList.add('dragging');
    e.preventDefault();
  });
  window.addEventListener('mousemove', e=>{
    if(!isDown)return;
    const dx=startX-e.pageX;
    scrollOuter.scrollLeft=startScroll+dx;
    const half=scrollOuter.scrollWidth/2;
    if(scrollOuter.scrollLeft<0) scrollOuter.scrollLeft+=half;
    if(scrollOuter.scrollLeft>=half) scrollOuter.scrollLeft-=half;
  });
  window.addEventListener('mouseup',()=>{
    if(!isDown)return;
    isDown=false; scrollPaused=false;
    scrollOuter.classList.remove('dragging');
  });
}

/* ────────── ENVIO E CHAT ────────── */
function doSend(){ const t=tiEl.value.trim(); if(!t||busy)return; tiEl.value=''; tiEl.style.height='auto'; sendText(t); }

async function sendText(text){
  if(!text||busy)return;
  setBusy(true); addUser(text); saveH('user',text); showTyp(true);
  const body={
    threadId:tid, runId:'run-'+Date.now(),
    messages:[{id:(crypto.randomUUID?crypto.randomUUID():Date.now()+''), role:'user', content:text}],
    state:{},tools:[],context:[],forwardedProps:{}
  };
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok){ const eb=await res.text().catch(()=>''); throw new Error('HTTP '+res.status+(eb?' — '+eb.slice(0,100):'')); }
    const raw=await res.text();
    let reply='',node=null;
    for(const line of raw.split('\n')){
      if(!line.startsWith('data: '))continue;
      const j=line.substring(6).trim(); if(!j)continue;
      try{
        const ev=JSON.parse(j);
        if(ev.type==='TEXT_MESSAGE_CONTENT'&&ev.delta){
          reply+=ev.delta; showTyp(false);
          if(!node) node=addBot(reply); else updBot(node,reply);
        }
      }catch(pe){console.warn('SSE:',pe);}
    }
    if(reply) saveH('assistant',reply);
    else{ showTyp(false); addBot('Desculpe, não entendi. Pode repetir?'); }
  }catch(e){
    showTyp(false);
    addBot('❌ '+(e.message||'Erro de conexão')+'\nAbra o console (F12) para detalhes.');
    console.error('[sendText]',e);
  }finally{ setBusy(false); }
}

/* ────────── RENDERIZAÇÃO DO CHAT ────────── */
function fmt(t){ return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function addUser(text,a=true){ const d=mkMsg('user','<div class="bubble">'+esc(text)+'</div>'); chatEl.insertBefore(d,typEl); scroll(); return d; }
function addBot(text,a=true){  const d=mkMsg('bot', '<div class="bubble">'+fmt(text)+'</div>'); chatEl.insertBefore(d,typEl); scroll(); return d; }
function mkMsg(role,html){ const d=document.createElement('div'); d.className='msg '+role; d.innerHTML=html; return d; }
function updBot(n,t){ n.querySelector('.bubble').innerHTML=fmt(t); scroll(); }
function scroll(){ requestAnimationFrame(()=>chatEl.scrollTop=chatEl.scrollHeight); }
function showTyp(v){ typEl.classList.toggle('on',v); if(v)scroll(); }
function setBusy(v){ busy=v; sendBtn.disabled=v; tiEl.disabled=v; if(!v)tiEl.focus(); }

/* ────────── HISTÓRICO LOCAL ────────── */
function saveH(role,content){ hist.push({role,content}); if(hist.length>100)hist=hist.slice(-100); try{localStorage.setItem('lu_hist',JSON.stringify(hist));}catch{} }

/* ────────── VOZ ────────── */
function toggleRec(){ recording?stopRec():startRec(); }
function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ showToast('Microfone não suportado'); return; }
  recog=new SR(); recog.lang='pt-BR'; recog.interimResults=false; recog.maxAlternatives=1;
  recog.onstart=()=>{ recording=true; micBtn.classList.add('rec'); micOv.classList.add('on'); };
  recog.onresult=e=>{ const t=e.results[0][0].transcript; stopRec(); tiEl.value=t; tiEl.style.height='auto'; tiEl.style.height=Math.min(tiEl.scrollHeight,96)+'px'; doSend(); };
  recog.onerror=e=>{ stopRec(); if(e.error!=='aborted')showToast('Não foi possível capturar áudio'); };
  recog.onend=()=>stopRec();
  recog.start();
}
function stopRec(){ recording=false; micBtn.classList.remove('rec'); micOv.classList.remove('on'); if(recog){try{recog.abort();}catch{}recog=null;} }

/* ────────── TOAST ────────── */
let tt;
function showToast(m){ toastEl.textContent=m; toastEl.classList.add('on'); clearTimeout(tt); tt=setTimeout(()=>toastEl.classList.remove('on'),3000); }

/* ────────── KEEP ALIVE ────────── */
function ping(){ setInterval(()=>fetch('https://atendente-lanchonete.onrender.com',{method:'HEAD',cache:'no-store'}).catch(()=>{}),60000); }

/* ────────── INICIALIZAÇÃO ────────── */
function init(){
  buildCarousel();
  tiEl.addEventListener('input',()=>{ tiEl.style.height='auto'; tiEl.style.height=Math.min(tiEl.scrollHeight,96)+'px'; });
  tiEl.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); doSend(); } });
  if(hist.length===0){
    addBot('Olá! 👋 Bem-vindo à **Chupeta Lanches**!\n\nEscolha um item do cardápio acima ou me diga o que deseja. 😊');
    saveH('assistant','Bem-vindo!');
  } else {
    hist.forEach(m=>m.role==='user'?addUser(m.content,false):addBot(m.content,false));
  }
  ping();
}

init();
</script>
</body>
