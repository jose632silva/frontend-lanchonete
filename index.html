<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanchonete do Zé</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: auto; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .user { text-align: right; color: blue; }
        .bot { text-align: left; color: green; }
        #input { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h1>🍔 Lanchonete do Zé</h1>
    <div id="chat"></div>
    <input id="input" placeholder="Digite seu pedido...">
    <button onclick="send()">Enviar</button>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = isUser ? 'user' : 'bot';
            div.innerHTML = `<strong>${isUser ? 'Você' : 'Bot'}:</strong> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const msg = input.value.trim();
            if (!msg) return;
            
            addMessage(msg, true);
            input.value = '';
            
            try {
                const response = await fetch('https://atendente-lanchonete.onrender.com/agui', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: msg }]
                    })
                });
                const data = await response.json();
                addMessage(data.response || data.message || JSON.stringify(data), false);
            } catch(e) {
                addMessage('Erro: ' + e.message, false);
            }
        }
        
        input.addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
        addMessage('Olá! O que deseja?', false);
    </script>
</body>
</html>
